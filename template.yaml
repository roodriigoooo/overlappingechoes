AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Spotify Similarity Graph - Serverless Architecture

Parameters:
  SpotifyClientId:
    Type: String
    Description: Spotify API Client ID
    NoEcho: false

  SpotifyClientSecret:
    Type: String
    Description: Spotify API Client Secret
    NoEcho: true

  JWTSecret:
    Type: String
    Description: Secret key for JWT token signing
    NoEcho: true

  HuggingFaceApiKey:
    Type: String
    Description: HuggingFace Inference API key for lyric embeddings
    NoEcho: true

  FrontendUrl:
    Type: String
    Description: Public URL of the frontend (used as post-login redirect)
    Default: https://overlappingechoes.app
    # NOTE: this must match the actual hosted frontend URL, or Spotify OAuth will redirect to a dead link

Globals:
  Function:
    Runtime: python3.12
    Timeout: 30
    MemorySize: 256
    Environment:
      Variables:
        USERS_TABLE: !Ref UsersTable
        FRIENDS_TABLE: !Ref FriendsTable
        FRIEND_REQUESTS_TABLE: !Ref FriendRequestsTable
        MUSIC_PROFILES_TABLE: !Ref MusicProfilesTable
        SPOTIFY_CLIENT_ID: !Ref SpotifyClientId
        SPOTIFY_CLIENT_SECRET: !Ref SpotifyClientSecret
        JWT_SECRET: !Ref JWTSecret
        FRONTEND_CALLBACK_URL: !Ref FrontendUrl

Resources:
  # ============================================
  # DynamoDB Tables
  # ============================================

  UsersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: SpotifyQueue-Users
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: spotifyId
          AttributeType: S
        - AttributeName: visibility
          AttributeType: S
        - AttributeName: lastLogin
          AttributeType: N
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: SpotifyIdIndex
          KeySchema:
            - AttributeName: spotifyId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: RecentActivityIndex
          KeySchema:
            - AttributeName: visibility
              KeyType: HASH
            - AttributeName: lastLogin
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES

  FriendsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: SpotifyQueue-Friends
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: friendId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: friendId
          KeyType: RANGE

  FriendRequestsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: SpotifyQueue-FriendRequests
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: requestId
          AttributeType: S
        - AttributeName: toUserId
          AttributeType: S
        - AttributeName: fromUserId
          AttributeType: S
      KeySchema:
        - AttributeName: requestId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: ToUserIndex
          KeySchema:
            - AttributeName: toUserId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: FromUserIndex
          KeySchema:
            - AttributeName: fromUserId
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  MusicProfilesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: SpotifyQueue-MusicProfiles
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH

  # ============================================
  # CloudFront Distribution for Frontend
  # ============================================

  FrontendDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: Spotify Graph Frontend
        DefaultRootObject: demo-interface.html
        HttpVersion: http2
        PriceClass: PriceClass_100
        Origins:
          - Id: S3StaticWebsite
            DomainName: spotify-queue-demo-hosting.s3-website-us-east-1.amazonaws.com
            CustomOriginConfig:
              OriginProtocolPolicy: http-only
              HTTPPort: 80
              HTTPSPort: 443
              OriginSSLProtocols:
                - TLSv1.2
        DefaultCacheBehavior:
          TargetOriginId: S3StaticWebsite
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
          CachedMethods:
            - GET
            - HEAD
          ForwardedValues:
            QueryString: true
            Cookies:
              Forward: none
          Compress: true
          MinTTL: 0
          DefaultTTL: 60
          MaxTTL: 300

  # ============================================
  # REST API Gateway
  # ============================================

  RestApi:
    Type: AWS::Serverless::Api
    Properties:
      Name: SpotifyQueue-RestApi
      StageName: prod
      Cors:
        AllowOrigin: "'*'"
        AllowHeaders: "'Content-Type,Authorization,X-Amz-Date,X-Api-Key,X-Amz-Security-Token,X-Auth-Token'"
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowCredentials: false
      GatewayResponses:
        DEFAULT_4XX:
          ResponseParameters:
            Headers:
              Access-Control-Allow-Origin: "'*'"
              Access-Control-Allow-Headers: "'Content-Type,Authorization,X-Amz-Date,X-Api-Key,X-Amz-Security-Token,X-Auth-Token'"
        DEFAULT_5XX:
          ResponseParameters:
            Headers:
              Access-Control-Allow-Origin: "'*'"
              Access-Control-Allow-Headers: "'Content-Type,Authorization,X-Amz-Date,X-Api-Key,X-Amz-Security-Token,X-Auth-Token'"
      Auth:
        DefaultAuthorizer: JWTAuthorizer
        AddDefaultAuthorizerToCorsPreflight: false
        Authorizers:
          JWTAuthorizer:
            FunctionArn: !GetAtt AuthorizerFunction.Arn
            FunctionPayloadType: REQUEST
            Identity:
              Headers:
                - X-Auth-Token
            AuthorizerResultTtlInSeconds: 300

  # ============================================
  # Lambda Functions - Authentication
  # ============================================

  HealthCheckFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: SpotifyQueue-HealthCheck
      CodeUri: src/health/
      Handler: health_check.handler
      Events:
        HealthCheck:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /health
            Method: GET
            Auth:
              Authorizer: NONE

  AuthorizerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: SpotifyQueue-Authorizer
      CodeUri: src/auth/
      Handler: authorizer.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref UsersTable

  SpotifyAuthFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: SpotifyQueue-SpotifyAuth
      CodeUri: src/auth/
      Handler: spotify_auth.handler
      Events:
        AuthUrl:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /auth/spotify
            Method: GET
            Auth:
              Authorizer: NONE
        AuthCallback:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /auth/callback
            Method: GET
            Auth:
              Authorizer: NONE
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable

  # ============================================
  # Lambda Functions - User Management
  # ============================================

  GetMeFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: SpotifyQueue-GetMe
      CodeUri: src/users/
      Handler: get_me.handler
      Events:
        GetMe:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /me
            Method: GET
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref UsersTable

  UpdateVisibilityFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: SpotifyQueue-UpdateVisibility
      CodeUri: src/users/
      Handler: update_visibility.handler
      Events:
        UpdateVisibility:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /me/visibility
            Method: PUT
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable

  # ============================================
  # Lambda Functions - Friend Management
  # ============================================

  SendFriendRequestFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: SpotifyQueue-SendFriendRequest
      CodeUri: src/friends/
      Handler: send_request.handler
      Events:
        SendRequest:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /friends/request
            Method: POST
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref FriendRequestsTable
        - DynamoDBReadPolicy:
            TableName: !Ref UsersTable
        - DynamoDBReadPolicy:
            TableName: !Ref FriendsTable

  ListFriendRequestsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: SpotifyQueue-ListFriendRequests
      CodeUri: src/friends/
      Handler: list_requests.handler
      Events:
        ListRequests:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /friends/requests
            Method: GET
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref FriendRequestsTable
        - DynamoDBReadPolicy:
            TableName: !Ref UsersTable

  AcceptFriendRequestFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: SpotifyQueue-AcceptFriendRequest
      CodeUri: src/friends/
      Handler: accept_request.handler
      Events:
        AcceptRequest:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /friends/accept
            Method: POST
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref FriendsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref FriendRequestsTable

  DeleteFriendFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: SpotifyQueue-DeleteFriend
      CodeUri: src/friends/
      Handler: delete_friend.handler
      Events:
        DeleteFriend:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /friends/{friendId}
            Method: DELETE
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref FriendsTable

  ListFriendsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: SpotifyQueue-ListFriends
      CodeUri: src/friends/
      Handler: list_friends.handler
      Events:
        ListFriends:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /friends
            Method: GET
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref FriendsTable
        - DynamoDBReadPolicy:
            TableName: !Ref UsersTable

  # ============================================
  # Lambda Functions - Music Profiles
  # ============================================

  UpdateMusicProfileFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: SpotifyQueue-UpdateMusicProfile
      CodeUri: src/profiles/
      Handler: update_profile.handler
      Timeout: 30
      MemorySize: 512
      Environment:
        Variables:
          COMPUTE_LYRIC_FUNCTION_ARN: !GetAtt ComputeLyricProfileFunction.Arn
      Events:
        UpdateProfile:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /me/profile/refresh
            Method: POST
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref UsersTable
        - DynamoDBCrudPolicy:
            TableName: !Ref MusicProfilesTable
        - Statement:
            - Effect: Allow
              Action:
                - lambda:InvokeFunction
              Resource: !GetAtt ComputeLyricProfileFunction.Arn

  ComputeLyricProfileFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: SpotifyQueue-ComputeLyricProfile
      CodeUri: src/profiles/
      Handler: compute_lyric_profile.handler
      Timeout: 900
      MemorySize: 512
      Environment:
        Variables:
          HUGGINGFACE_API_KEY: !Ref HuggingFaceApiKey
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref MusicProfilesTable

  GetProfileStatusFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: SpotifyQueue-GetProfileStatus
      CodeUri: src/profiles/
      Handler: get_profile_status.handler
      Timeout: 10
      Events:
        GetProfile:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /me/profile
            Method: GET
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref MusicProfilesTable

  # ============================================
  # Lambda Functions - Similarity Graph
  # ============================================

  GetGraphFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: SpotifyQueue-GetGraph
      CodeUri: src/graph/
      Handler: get_graph.handler
      Timeout: 15
      Events:
        GetGraph:
          Type: Api
          Properties:
            RestApiId: !Ref RestApi
            Path: /graph
            Method: GET
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref UsersTable
        - DynamoDBReadPolicy:
            TableName: !Ref FriendsTable
        - DynamoDBReadPolicy:
            TableName: !Ref MusicProfilesTable

Outputs:
  RestApiUrl:
    Description: REST API Gateway endpoint URL
    Value: !Sub 'https://${RestApi}.execute-api.${AWS::Region}.amazonaws.com/prod/'

  FrontendUrl:
    Description: HTTPS entrypoint for the static frontend
    Value: !Sub 'https://${FrontendDistribution.DomainName}'
